<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Background: rgb(68, 114, 210) — project primary color, hardcoded per spec.
    rx="7" preserves the rounded-2xl feel at 32px scale.
  -->
  <rect width="32" height="32" rx="7" fill="#4472D2"/>

  <!--
    Verbatim official Lucide MessageCircle path (viewBox 0 0 24 24).
    Scaled to 20px and centered: translate(6, 6) scale(20/24 ≈ 0.8333).
    Stroke-only at stroke-width 2 keeps the icon crisp at 16px tab size.
  -->
  <g transform="translate(6,6) scale(0.8333)" fill="none" stroke="white"
     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"/>
  </g>
</svg>